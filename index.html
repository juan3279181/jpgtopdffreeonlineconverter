    <div class="content">
        <h1>JPG to PDF Converter</h1>
        <p>Easily convert your JPG images to PDF format. Upload your images, convert them, and download the PDF.</p>

        <div class="converter-container">
            <h2>Convert Your Images</h2>
            
            <div class="upload-area" id="uploadArea">
                <i>📁</i>
                <p>Click here or drag and drop your JPG images</p>
                <input type="file" id="fileInput" class="file-input" accept=".jpg,.jpeg,.png" multiple />
            </div>
            
            <div class="image-list" id="imageList"></div>
            
            <div class="preview-container" id="previewContainer">
                <h3>Image Preview</h3>
                <img id="previewImage" class="preview-image" src="" alt="Preview" />
            </div>
            
            <div style="text-align: center;">
                <button id="convertButton" class="button button-convert" disabled>Convert to PDF</button>
                <button id="clearButton" class="button" disabled>Clear Images</button>
            </div>
            
            <div id="statusMessage" class="status-message"></div>
        </div>
        
        <p>Here is more content on the page.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        let uploadedImages = [];
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const convertButton = document.getElementById('convertButton');
        const clearButton = document.getElementById('clearButton');
        const statusMessage = document.getElementById('statusMessage');
        const imageList = document.getElementById('imageList');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.backgroundColor = '#d6eaf8';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.backgroundColor = '#ecf0f1';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.backgroundColor = '#ecf0f1';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        convertButton.addEventListener('click', convertToPdf);
        clearButton.addEventListener('click', clearImages);

        function handleFiles(files) {
            if (files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];

                if (!file.type.match('image.*')) {
                    showStatus('Please upload only image files (JPG, PNG).', 'error');
                    continue;
                }

                const reader = new FileReader();

                reader.onload = (e) => {
                    const imageData = {
                        name: file.name,
                        data: e.target.result
                    };

                    uploadedImages.push(imageData);
                    updateImageList();
                    updateButtons();

                    if (uploadedImages.length === 1) {
                        previewImage.src = imageData.data;
                        previewContainer.style.display = 'block';
                    }
                };

                reader.readAsDataURL(file);
            }

            fileInput.value = '';
        }

        function updateImageList() {
            imageList.innerHTML = '';

            if (uploadedImages.length === 0) {
                imageList.style.display = 'none';
                return;
            }

            imageList.style.display = 'block';

            uploadedImages.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'image-item';

                const name = document.createElement('span');
                name.textContent = image.name;

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-image';
                removeBtn.innerHTML = '&times;';
                removeBtn.addEventListener('click', () => removeImage(index));

                item.appendChild(name);
                item.appendChild(removeBtn);
                imageList.appendChild(item);
            });
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImageList();
            updateButtons();

            if (uploadedImages.length === 0) {
                previewContainer.style.display = 'none';
            } else {
                previewImage.src = uploadedImages[0].data;
            }
        }

        function clearImages() {
            uploadedImages = [];
            updateImageList();
            updateButtons();
            previewContainer.style.display = 'none';
        }

        function updateButtons() {
            convertButton.disabled = uploadedImages.length === 0;
            clearButton.disabled = uploadedImages.length === 0;
        }

        function convertToPdf() {
            if (uploadedImages.length === 0) {
                showStatus('Please upload at least one image first.', 'error');
                return;
            }

            showStatus('Converting images to PDF...', 'success');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            uploadedImages.forEach((image, index) => {
                if (index > 0) doc.addPage();

                const img = new Image();
                img.src = image.data;

                img.onload = function() {
                    const imgWidth = doc.internal.pageSize.getWidth();
                    const imgHeight = (img.height * imgWidth) / img.width;

                    doc.addImage(image.data, 'JPEG', 0, 0, imgWidth, imgHeight);

                    if (index === uploadedImages.length - 1) {
                        doc.save('converted_images.pdf');
                        showStatus('PDF successfully created and downloaded!', 'success');
                    }
                };
            });
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type}`;
            statusMessage.style.display = 'block';

            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }
    </script>
